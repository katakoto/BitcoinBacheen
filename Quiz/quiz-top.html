<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズに挑戦！ – BITCOIN バチーン！</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=M+PLUS+Rounded+1c:wght@700;900&family=Boogaloo&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD700;
    --orange: #FF6600;
    --red:    #E82020;
    --cyan:   #00F5FF;
    --dark:   #160A00;
    --white:  #FFFDE7;
    --bg:     #FFE200;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--bg);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: var(--dark);
    overflow-x: hidden;
    background-image: radial-gradient(circle, rgba(255,102,0,0.14) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .quiz-header {
    background: var(--dark);
    padding: 14px 20px;
    text-align: center;
    border-bottom: 5px solid var(--orange);
    position: relative;
  }
  .back-btn {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--yellow);
    font-family: 'Zen Dots', sans-serif;
    font-size: 12px;
    text-decoration: none;
    border: 2px solid var(--orange);
    padding: 5px 12px;
    border-radius: 20px;
    transition: background .15s;
    white-space: nowrap;
  }
  .back-btn:hover { background: var(--orange); }
  .quiz-header h1 {
    font-family: 'Boogaloo', sans-serif;
    font-size: clamp(22px, 5vw, 42px);
    color: var(--yellow);
    -webkit-text-stroke: 2px var(--dark);
    text-shadow: 4px 4px 0 var(--orange);
    letter-spacing: 3px;
  }

  /* ── MAIN ── */
  .top-area {
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    text-align: center;
  }

  /* ── MASCOT ── */
  .top-mascot {
    width: 160px;
    height: auto;
    border: 6px solid var(--dark);
    border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    box-shadow: 8px 8px 0 var(--dark);
    background: white;
    padding: 10px;
    margin: 0 auto 28px;
    display: block;
    animation: mascotBob 2.5s ease-in-out infinite alternate;
  }
  @keyframes mascotBob {
    from { transform: translateY(0) rotate(-2deg); }
    to   { transform: translateY(-14px) rotate(2deg); }
  }

  /* ── TITLE ── */
  .top-title {
    font-family: 'Boogaloo', sans-serif;
    font-size: clamp(28px, 7vw, 52px);
    color: var(--dark);
    background: var(--yellow);
    border: 5px solid var(--dark);
    border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    box-shadow: 8px 8px 0 var(--dark);
    padding: 14px 32px;
    display: inline-block;
    margin-bottom: 18px;
    letter-spacing: 2px;
  }

  /* ── COUNT BADGE ── */
  .count-badge {
    font-family: 'Zen Dots', sans-serif;
    font-size: 14px;
    color: var(--orange);
    background: var(--dark);
    border: 3px solid var(--orange);
    border-radius: 30px;
    padding: 6px 22px;
    display: inline-block;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  /* ── DESC ── */
  .top-desc {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.8;
    margin-bottom: 36px;
    background: white;
    border: 4px solid var(--dark);
    border-radius: 12px 255px 12px 255px / 255px 12px 255px 12px;
    box-shadow: 6px 6px 0 var(--dark);
    padding: 18px 24px;
  }

  /* ── BUTTONS ── */
  .btn-start {
    display: block; width: 100%;
    background: var(--orange);
    color: var(--yellow);
    font-family: 'Boogaloo', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    padding: 20px;
    border: 5px solid var(--dark);
    border-radius: 12px 255px 10px 255px / 255px 10px 255px 8px;
    box-shadow: 8px 8px 0 var(--dark);
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    margin-bottom: 14px;
    text-decoration: none;
    -webkit-text-stroke: 0.5px rgba(0,0,0,.15);
  }
  .btn-start:hover {
    transform: translate(-4px,-4px);
    box-shadow: 12px 12px 0 var(--dark);
    background: var(--yellow); color: var(--dark);
  }
  .btn-start:active { transform: translate(3px,3px); box-shadow: 4px 4px 0 var(--dark); }

  .btn-col {
    display: block; width: 100%;
    background: var(--cyan);
    color: var(--dark);
    font-family: 'Boogaloo', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 14px;
    border: 5px solid var(--dark);
    border-radius: 255px 10px 225px 10px / 10px 225px 10px 255px;
    box-shadow: 6px 6px 0 var(--dark);
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    margin-bottom: 12px;
    text-decoration: none;
    font-weight: 900;
  }
  .btn-col:hover {
    transform: translate(-4px,-4px);
    box-shadow: 10px 10px 0 var(--dark);
    background: var(--yellow); color: var(--dark);
  }
  .btn-col:active { transform: translate(3px,3px); box-shadow: 3px 3px 0 var(--dark); }

  .btn-home {
    display: block; width: 100%;
    background: var(--dark);
    color: var(--yellow);
    font-family: 'Boogaloo', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 12px;
    border: 4px solid var(--dark);
    border-radius: 10px;
    box-shadow: 4px 4px 0 rgba(0,0,0,.3);
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    text-decoration: none;
  }
  .btn-home:hover { background: #333; transform: translate(-3px,-3px); box-shadow: 7px 7px 0 rgba(0,0,0,.3); }

  /* ── FOOTER STRIPE ── */
  body::after {
    content: '';
    display: block;
    height: 8px;
    background: repeating-linear-gradient(90deg,
      var(--yellow) 0 24px, var(--orange) 24px 48px,
      var(--red) 48px 72px, var(--cyan) 72px 96px,
      var(--dark) 96px 120px
    );
    margin-top: 60px;
  }
</style>
</head>
<body>

<div class="quiz-header">
  <a href="../index.html" class="back-btn">← トップへ</a>
  <h1>⚡ クイズに挑戦 ⚡</h1>
</div>

<div class="top-area">
  <img src="../icon/001.png" alt="ビットコインくん" class="top-mascot">
  <div class="top-title">ビットコイン<br>クイズ！</div>
  <div class="count-badge">全 20 問 ⚡</div>
  <p class="top-desc">
    クイズに答えながら<br>
    ビットコインの基礎知識を<br>
    楽しく学ぼう！<br>
    全問正解できるかな？ ⚡
  </p>
  <a href="quiz.html" class="btn-start">⚡ クイズスタート！ ⚡</a>
  <a href="../columns/index.html" class="btn-col">📚 コラムを読む</a>
  <a href="../index.html" class="btn-home">← サイトトップへ戻る</a>
</div>

</body>
</html>
